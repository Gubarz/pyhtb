name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-n-publish:
    name: Build and publish Python SDK to PyPI
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishing (OIDC) authentication with PyPI
      id-token: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine
        python -m pip install -e .[test]

    - name: Verify tag matches package version
      run: |
        python - <<'PY'
        import os
        import sys
        import tomllib

        tag = os.environ["GITHUB_REF_NAME"]
        with open("pyproject.toml", "rb") as pyproject:
            version = tomllib.load(pyproject)["project"]["version"]

        expected = f"v{version}"
        if tag != expected:
            print(f"Release tag {tag!r} does not match pyproject version {version!r}. Expected {expected!r}.")
            sys.exit(1)
        PY

    - name: Run tests
      run: python -m pytest -q

    - name: Build Package
      run: python -m build

    - name: Check package metadata
      run: python -m twine check dist/*

    - name: Install built wheel
      run: python -m pip install --force-reinstall dist/*.whl

    - name: Smoke test CLI
      run: pyhtb --version

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
