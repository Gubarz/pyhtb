name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate package on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e .[test]

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test CLI
        run: pyhtb --version

  codegen:
    name: Check generated client code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # openapi-python-client requires Python >= 3.11
          python-version: "3.13"

      - name: Install codegen dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[codegen]

      - name: Check generated client code
        run: |
          ./api/regen.sh
          git diff --exit-code -- pyhtb
